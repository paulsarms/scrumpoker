<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrum Poker</title>
    <script>
      // Set theme attributes before first paint to avoid a flash of the
      // wrong theme. Mirrors the logic in src/composables/useTheme.js.
      (function () {
        try {
          var root = document.documentElement;
          var theme = localStorage.getItem('scrumpoker_theme');
          root.dataset.theme = theme === 'minimalism' ? 'minimalism' : 'neobrutalism';
          var scheme = localStorage.getItem('scrumpoker_color_scheme');
          if (scheme !== 'light' && scheme !== 'dark') {
            scheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          root.dataset.colorScheme = scheme;
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
